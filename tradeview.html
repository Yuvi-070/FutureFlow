<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Trading Chart</title>
    <style>
        /* CSS Styles */
        body {
            margin: 0;
            padding: 0;
            background: #131722;
            color: white;
            font-family: 'Arial', sans-serif;
        }

        .chart-container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        .chart-header {
            padding: 20px;
            background: #1a1e29;
            border-bottom: 1px solid #2a2e39;
        }

        .chart-title {
            font-size: 24px;
            margin: 0;
        }

        #tradingview_chart {
            width: 100%;
            height: calc(100vh - 70px);
        }
    </style>
</head>
<body>
    <!-- Chart Container -->
    <div class="chart-container">
        <div class="chart-header">
            <h1 class="chart-title">BTC/USD Live Chart</h1>
        </div>
        <div id="tradingview_chart"></div>
    </div>

    <!-- JavaScript -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Initialize TradingView Chart
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "60",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "allow_symbol_change": true,
            "watchlist": ["BINANCE:BTCUSDT", "BINANCE:ETHUSDT", "NASDAQ:AAPL"],
            "details": true,
            "hotlist": true,
            "studies": [
                "Volume@tv-basicstudies",
                "BB@tv-basicstudies",
                "RSI@tv-basicstudies"
            ],
            "container_id": "tradingview_chart"
        });

        // Optional: Add resize observer
        new ResizeObserver(() => {
            window.dispatchEvent(new Event('resize'));
        }).observe(document.getElementById('tradingview_chart'));
    </script>
</body>
</html>
