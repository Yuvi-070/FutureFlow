<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Platform Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                        url('https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            color: white;
        }

        .container {
            background: rgba(18, 23, 34, 0.9);
            width: 380px;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            width: 120px;
            margin: 0 auto 2rem;
            display: block;
            filter: brightness(0) invert(1);
        }

        h2 {
            text-align: center;
            margin-bottom: 2rem;
            color: #fff;
            font-size: 1.8rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        input:focus {
            outline: none;
            border-color: #00e676;
            background: rgba(0, 230, 118, 0.05);
            box-shadow: 0 0 8px rgba(0, 230, 118, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 1.5rem;
            background: linear-gradient(45deg, #00e676, #00c853);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: linear-gradient(45deg, #00c853, #009624);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 200, 83, 0.3);
        }

        .auth-redirect {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .auth-link {
            color: #00e676;
            text-decoration: none;
            margin-left: 0.5rem;
            transition: opacity 0.3s ease;
        }

        .auth-link:hover {
            opacity: 0.8;
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @media (max-width: 480px) {
            .container {
                width: 90%;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://cdn-icons-png.flaticon.com/512/477/477103.png" alt="Trading Logo" class="logo">
        <h2>Trader Login</h2>
        <input type="text" id="loginUser" placeholder="Trader ID">
        <input type="password" id="loginPass" placeholder="Secure PIN">
        <button onclick="login()">Access Terminal</button>
        
        <div class="auth-redirect">
            New trader? <a href="signup.html" class="auth-link">Create Account</a>
        </div>
    </div>

    <script>
        function login() {
            const user = document.getElementById("loginUser").value;
            const pass = document.getElementById("loginPass").value;
            const container = document.querySelector(".container");

            const storedUser = localStorage.getItem("tradingUser");
            const storedPass = localStorage.getItem("tradingPass");

            if (user === storedUser && pass === storedPass) {
                // alert("Authentication Verified\nAccessing Market Data...");
                window.location.href = "index.html";
            } else {
                container.classList.add('shake');
                setTimeout(() => container.classList.remove('shake'), 400);
                alert("Security Alert: Invalid Credentials");
            }
        }
    </script>
</body>
</html>
